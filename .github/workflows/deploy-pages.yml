name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify build output consistency
        run: |
          npm run build
          find dist -type f ! -name 'sw.js' -print0 | sort -z | xargs -0 shasum > /tmp/dist-hash-1.txt
          npm run build
          find dist -type f ! -name 'sw.js' -print0 | sort -z | xargs -0 shasum > /tmp/dist-hash-2.txt
          diff -u /tmp/dist-hash-1.txt /tmp/dist-hash-2.txt

      - name: Stamp app release metadata
        run: |
          RELEASE="$(date -u '+%y-%m-%d %H:%M')"
          sed -i "s|__APP_RELEASE__|${RELEASE}|g" src/lib/release.ts

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -R dist/. _site/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
